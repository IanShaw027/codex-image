interface:
  display_name: "Codex Image"
  short_description: "Saved-file Images API workflow for API-key mode, custom base URLs, exact paths or sizes, and built-in fallback"
  icon_small: "./assets/codex-image.svg"
  icon_large: "./assets/codex-image.svg"
  default_prompt: "Use $codex-image for local saved-file Images API work: API-key mode, custom `OPENAI_BASE_URL`, exact output path/size, PNG/JPEG/WebP output, or fallback when `image_gen` is hidden, unavailable, or fails before producing an image. Invoke the installed launcher, not a repo-relative path: on POSIX `bash \"${CODEX_HOME:-$HOME/.codex}/skills/codex-image/scripts/codex-image\"`; on Windows use `%CODEX_HOME%\\skills\\codex-image\\scripts\\codex-image.cmd` or `%USERPROFILE%\\.codex\\skills\\codex-image\\scripts\\codex-image.cmd`. Usually run the launcher first and let it validate runtime and credentials; inspect config, auth, or `--help` only when the launcher is missing or its failure still leaves command shape unclear. Use `edit` for real input images and prefer `--prompt` for long text. `[Image #N]`, `[Turn -K Image #N]`, `[Thread Image #N]`, `[Last Output]`, and `--image-set ...` are Codex-thread-only; outside a thread use real file paths."

policy:
  allow_implicit_invocation: true
