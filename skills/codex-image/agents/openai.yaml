interface:
  display_name: "Codex Image"
  short_description: "Saved-file image workflow for API-key mode, exact paths or sizes, default Images API, and explicit Responses fallback"
  icon_small: "./assets/codex-image.svg"
  icon_large: "./assets/codex-image.svg"
  default_prompt: "Use $codex-image for local saved-file image work in API-key mode, with custom `OPENAI_BASE_URL`, exact output path/size, PNG/JPEG/WebP output, batch jobs, explicit thread image references, or when `image_gen` is hidden, unavailable, or failed. Prefer built-in `imagegen` for the normal native image conversation path: current-turn image context, fastest simple generate/edit, and natural multi-turn follow-up without local file control. Invoke the installed launcher directly, for example POSIX `bash \"${CODEX_HOME:-$HOME/.codex}/skills/codex-image/scripts/codex-image\" ...` or Windows `%CODEX_HOME%\\skills\\codex-image\\scripts\\codex-image.cmd ...`. `generate` and `edit` default to the Images API; use `--transport responses` only for explicit prior response image state. Use `edit` for real input images. `[Image #N]`, `[Turn -K Image #N]`, `[Thread Image #N]`, `[Last Output]`, and `--image-set ...` are Codex-thread-only explicit local references, not native built-in runtime image context."

policy:
  allow_implicit_invocation: true
