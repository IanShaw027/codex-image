interface:
  display_name: "Codex Image"
  short_description: "Generate or edit saved images when built-in image_gen is unavailable"
  icon_small: "./assets/codex-image.svg"
  icon_large: "./assets/codex-image.svg"
  default_prompt: "Use $codex-image for raster image generation or editing when the current Codex session does not expose the built-in image_gen tool, when Codex is in API key mode, or when the user asks for saved PNG/JPEG/WebP output, exact output paths, exact sizes, aspect ratios, Images API, custom OPENAI_BASE_URL, or the local CLI workflow. This skill is Images API only: use the bundled scripts, preserve Codex config lookup and output-path behavior, and save the final image to disk with a concrete path. Do not replace this workflow with hand-drawn SVG, Pillow sketches, screenshots, or one-off scripts unless the user explicitly asks for code-native drawing."

policy:
  allow_implicit_invocation: true
