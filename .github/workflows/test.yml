name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Check CLI syntax
        run: python -m py_compile skills/codex-image/scripts/codex_image.py tests/test_size_normalization.py tests/test_transport_regressions.py

      - name: Check CLI help
        run: python skills/codex-image/scripts/codex_image.py generate --help
