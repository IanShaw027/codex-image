name: Bug report
description: Report a codex-image CLI or skill issue
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command you ran. Remove secrets before submitting.
      render: bash
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the relevant terminal output. Remove API keys or tokens.
      render: text
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python3 --version"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
